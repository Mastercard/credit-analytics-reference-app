# Credit Analytics reference-app runtime configuration
# NOTE: This file currently contains the values previously hardcoded in ApiExamples.
#       Replace with your own credentials and DO NOT commit real secrets.

creditanalytics.api.basePath=https://sandbox.api.mastercard.com/small-business/credit-analytics/locations

mastercard.oauth.pkcs12KeyFile=// a reasonable place to store this would be src/main/resources/*.p12
mastercard.oauth.keyAlias=your keyalias
mastercard.oauth.keyPassword=your keystorepassword
mastercard.oauth.consumerKey=consumer key from your Developer Zone project

